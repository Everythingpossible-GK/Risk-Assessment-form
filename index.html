<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Assessment Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'IBM Plex Sans Arabic', sans-serif; background-color: #f1f5f9; }
        [dir="rtl"] { text-align: right; }
        textarea { resize: none; }
        
        /* Risk Matrix Colors */
        .risk-stop { background-color: #dc2626 !important; color: white !important; }    /* 20-25 */
        .risk-urgent { background-color: #f97316 !important; color: white !important; }  /* 15-16 */
        .risk-action { background-color: #facc15 !important; color: black !important; }  /* 8-12 */
        .risk-monitor { background-color: #4ade80 !important; color: black !important; } /* 3-6 */
        .risk-none { background-color: #16a34a !important; color: white !important; }    /* 1-2 */

        /* Status Colors */
        .status-not-started { background-color: #f1f5f9 !important; color: #64748b !important; border: 1px solid #cbd5e1 !important; }
        .status-in-progress { background-color: #eff6ff !important; color: #1d4ed8 !important; border: 1px solid #bfdbfe !important; }
        .status-completed { background-color: #f0fdf4 !important; color: #15803d !important; border: 1px solid #bbf7d0 !important; }
        .status-cancelled { background-color: #fef2f2 !important; color: #b91c1c !important; border: 1px solid #fecaca !important; }

        @page { size: A4 landscape; margin: 10mm; }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            #main-container { box-shadow: none !important; width: 100% !important; max-width: 100% !important; margin: 0 !important; border: none !important; }
            table { font-size: 7pt !important; border-collapse: collapse !important; width: 100% !important; table-layout: fixed !important; }
            th, td { border: 1px solid #aaa !important; padding: 2px !important; word-wrap: break-word !important; }
            textarea, input, select { border: none !important; background: transparent !important; padding: 0 !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>
    <div id="app" class="p-4 md:p-8 print:p-0"></div>

    <script>
        const translations = {
            en: {
                dir: 'ltr', title: "Risk Assessment Portal", formTitle: "Risk Assessment Form",
                owner: "Owner", workActivity: "Work Activity", participants: "Participants",
                description: "Description", raNumber: "Risk Assessment Number",
                assessDate: "Assessment Date", reviewDate: "Review Date",
                btnHazard: "View Hazard Table", btnPrint: "Print", btnExcel: "Export Excel", btnWord: "Export Word",
                btnSaveJson: "Save Data (JSON)", btnLoadJson: "Restore Data (JSON)",
                colHazard: "What is the hazard?", colWho: "Who might be harmed?", colHow: "How might people be harmed?",
                colControls: "Existing risk control measures", colRating: "Risk rating",
                colAddControls: "Additional controls", colResidual: "New risk rating",
                colActionPlan: "Action Plan", actionDesc: "ACTION DESCRIPTION",
                actionOwner: "OWNER", actionDeadline: "DEADLINE", actionStatus: "STATUS",
                btnAddAction: "Add Action", btnAddRow: "Add Row", signAssessor: "Signature",
                statusNotStarted: "Not Started", statusInProgress: "In Progress", statusCompleted: "Completed", statusCancelled: "Cancelled",
                matrixTitle: "Risk Matrix", footer: "Internal Risk Assessment Document"
            },
            ar: {
                dir: 'rtl', title: "بوابة تقييم المخاطر", formTitle: "نموذج تقييم المخاطر",
                owner: "المالك", workActivity: "نشاط العمل", participants: "المشاركون",
                description: "الوصف", raNumber: "رقم تقييم المخاطر",
                assessDate: "تاريخ التقييم", reviewDate: "تاريخ المراجعة",
                btnHazard: "جدول المخاطر", btnPrint: "طباعة", btnExcel: "تصدير Excel", btnWord: "تصدير Word",
                btnSaveJson: "حفظ JSON", btnLoadJson: "استعادة JSON",
                colHazard: "ما هو الخطر؟", colWho: "من قد يتضرر؟", colHow: "كيف يتضرر الناس؟",
                colControls: "تدابير المراقبة الحالية", colRating: "التقييم",
                colAddControls: "ضوابط إضافية", colResidual: "التقييم الجديد",
                colActionPlan: "خطة العمل", actionDesc: "وصف الإجراء",
                actionOwner: "المسؤول", actionDeadline: "الموعد النهائي", actionStatus: "الحالة",
                btnAddAction: "إضافة إجراء", btnAddRow: "إضافة صف", signAssessor: "التوقيع",
                statusNotStarted: "لم يبدأ", statusInProgress: "قيد التنفيذ", statusCompleted: "مكتمل", statusCancelled: "ملغى",
                matrixTitle: "مصفوفة المخاطر", footer: "وثيقة تقييم المخاطر"
            }
        };

        let state = {
            lang: 'en',
            rows: [{
                id: Date.now(), hazard: '', who: '', how: '', existingControls: '',
                initialL: 1, initialC: 1, additionalControls: '', residualL: 1, residualC: 1,
                actions: [{ id: Date.now(), desc: '', owner: '', deadline: '', status: 'Not Started' }]
            }],
            headerInfo: { owner: '', workActivity: '', participants: '', description: '', raNumber: '', assessDate: '', reviewDate: '' },
            modal: null
        };

        function getRiskColor(score) {
            if (score >= 20) return 'risk-stop';
            if (score >= 15) return 'risk-urgent';
            if (score >= 8) return 'risk-action';
            if (score >= 3) return 'risk-monitor';
            return 'risk-none';
        }

        function getStatusClass(status) {
            switch(status) {
                case 'In Progress': return 'status-in-progress';
                case 'Completed': return 'status-completed';
                case 'Cancelled': return 'status-cancelled';
                default: return 'status-not-started';
            }
        }

        function render() {
            const app = document.getElementById('app');
            const t = translations[state.lang];
            document.body.dir = t.dir;

            app.innerHTML = `
                <div id="main-container" class="max-w-[99%] mx-auto bg-white shadow-xl rounded-lg overflow-hidden print:shadow-none">
                    <div class="bg-slate-900 p-4 text-white flex flex-wrap gap-3 items-center justify-between no-print">
                        <div class="flex items-center gap-2 text-xl font-bold"><i data-lucide="shield-check" class="text-green-400"></i> ${t.title}</div>
                        <div class="flex flex-wrap gap-2">
                            <button onclick="toggleLang()" class="px-3 py-2 bg-slate-700 hover:bg-slate-600 rounded text-xs font-bold transition-colors">${state.lang === 'en' ? 'العربية' : 'English'}</button>
                            <button onclick="window.print()" class="px-3 py-2 bg-blue-600 hover:bg-blue-700 rounded text-xs font-bold transition-colors">${t.btnPrint}</button>
                            <button onclick="exportXls()" class="px-3 py-2 bg-green-600 hover:bg-green-700 rounded text-xs font-bold transition-colors">${t.btnExcel}</button>
                            <button onclick="exportDoc()" class="px-3 py-2 bg-indigo-600 hover:bg-indigo-700 rounded text-xs font-bold transition-colors">${t.btnWord}</button>
                            <button onclick="exportJson()" class="px-3 py-2 bg-slate-600 hover:bg-slate-500 rounded text-xs font-bold transition-colors">${t.btnSaveJson}</button>
                            <button onclick="document.getElementById('json-input').click()" class="px-3 py-2 bg-slate-600 hover:bg-slate-500 rounded text-xs font-bold transition-colors">${t.btnLoadJson}</button>
                            <input type="file" id="json-input" class="hidden" accept=".json" onchange="importJson(event)">
                        </div>
                    </div>

                    <div id="printable-area" class="p-6">
                        <h1 class="text-2xl font-black text-slate-800 uppercase mb-6">${t.formTitle}</h1>
                        
                        <!-- Header Row 1: Owner | Work Activity | Participants -->
                        <div class="grid grid-cols-3 gap-6 mb-4">
                            <div><label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest">${t.owner}</label><input class="w-full border-b border-slate-200 outline-none py-1" value="${state.headerInfo.owner}" onchange="updateHeader('owner', this.value)"></div>
                            <div><label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest">${t.workActivity}</label><input class="w-full border-b border-slate-200 outline-none py-1" value="${state.headerInfo.workActivity}" onchange="updateHeader('workActivity', this.value)"></div>
                            <div><label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest">${t.participants}</label><input class="w-full border-b border-slate-200 outline-none py-1" value="${state.headerInfo.participants}" onchange="updateHeader('participants', this.value)"></div>
                        </div>

                        <!-- Header Row 2: Description | RA Number | Dates -->
                        <div class="grid grid-cols-4 gap-6 mb-8">
                            <div><label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest">${t.description}</label><input class="w-full border-b border-slate-200 outline-none py-1" value="${state.headerInfo.description}" onchange="updateHeader('description', this.value)"></div>
                            <div><label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest">${t.raNumber}</label><input class="w-full border-b border-slate-200 outline-none py-1 font-bold" value="${state.headerInfo.raNumber}" onchange="updateHeader('raNumber', this.value)"></div>
                            <div><label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest">${t.assessDate}</label><input type="date" class="w-full border-b border-slate-200 outline-none py-1" value="${state.headerInfo.assessDate}" onchange="updateHeader('assessDate', this.value)"></div>
                            <div><label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest text-red-600">${t.reviewDate}</label><input type="date" class="w-full border-b border-slate-200 outline-none py-1 text-red-600 font-bold" value="${state.headerInfo.reviewDate}" onchange="updateHeader('reviewDate', this.value)"></div>
                        </div>

                        <div class="overflow-x-auto">
                            <table class="w-full border-collapse border border-slate-300 text-[10.5px]">
                                <thead class="bg-slate-200 uppercase font-bold text-[8.5px]">
                                    <tr>
                                        <th class="border border-slate-400 p-2 text-start w-[12%]" rowspan="2">${t.colHazard}</th>
                                        <th class="border border-slate-400 p-2 text-start w-[10%]" rowspan="2">${t.colWho}</th>
                                        <th class="border border-slate-400 p-2 text-start w-[10%]" rowspan="2">${t.colHow}</th>
                                        <th class="border border-slate-400 p-2 text-start w-[12%]" rowspan="2">${t.colControls}</th>
                                        <th class="border border-slate-400 p-0.5 text-center" colspan="3">${t.colRating}</th>
                                        <th class="border border-slate-400 p-2 text-start w-[12%]" rowspan="2">${t.colAddControls}</th>
                                        <th class="border border-slate-400 p-0.5 text-center" colspan="3">${t.colResidual}</th>
                                        <th class="border border-slate-400 p-2 text-center min-w-[450px]" rowspan="2">${t.colActionPlan}</th>
                                        <th class="no-print w-8 border-l border-slate-300" rowspan="2"></th>
                                    </tr>
                                    <tr class="text-center">
                                        <th class="border border-slate-400 w-8">L</th><th class="border border-slate-400 w-8">C</th><th class="border border-slate-400 w-10">R</th>
                                        <th class="border border-slate-400 w-8">L</th><th class="border border-slate-400 w-8">C</th><th class="border border-slate-400 w-10">R</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${state.rows.map(row => {
                                        const r1 = Number(row.initialL) * Number(row.initialC);
                                        const r2 = Number(row.residualL) * Number(row.residualC);
                                        return `
                                            <tr class="align-top hover:bg-slate-50 transition-colors">
                                                <td class="border border-slate-300 p-1"><textarea onchange="updateRow(${row.id}, 'hazard', this.value)" class="w-full bg-transparent outline-none p-1" rows="6">${row.hazard}</textarea></td>
                                                <td class="border border-slate-300 p-1"><textarea onchange="updateRow(${row.id}, 'who', this.value)" class="w-full bg-transparent outline-none p-1" rows="6">${row.who}</textarea></td>
                                                <td class="border border-slate-300 p-1"><textarea onchange="updateRow(${row.id}, 'how', this.value)" class="w-full bg-transparent outline-none p-1" rows="6">${row.how}</textarea></td>
                                                <td class="border border-slate-300 p-1"><textarea onchange="updateRow(${row.id}, 'existingControls', this.value)" class="w-full bg-transparent outline-none p-1" rows="6">${row.existingControls}</textarea></td>
                                                
                                                <td onclick="openModal(${row.id}, 'initial')" class="border border-slate-300 text-center font-bold cursor-pointer hover:bg-blue-50 align-middle">${row.initialL}</td>
                                                <td onclick="openModal(${row.id}, 'initial')" class="border border-slate-300 text-center font-bold cursor-pointer hover:bg-blue-50 align-middle">${row.initialC}</td>
                                                <td class="border border-slate-300 text-center font-black align-middle ${getRiskColor(r1)}">${r1}</td>

                                                <td class="border border-slate-300 p-1"><textarea onchange="updateRow(${row.id}, 'additionalControls', this.value)" class="w-full bg-transparent outline-none p-1" rows="6">${row.additionalControls}</textarea></td>

                                                <td onclick="openModal(${row.id}, 'residual')" class="border border-slate-300 text-center font-bold cursor-pointer hover:bg-blue-50 align-middle">${row.residualL}</td>
                                                <td onclick="openModal(${row.id}, 'residual')" class="border border-slate-300 text-center font-bold cursor-pointer hover:bg-blue-50 align-middle">${row.residualC}</td>
                                                <td class="border border-slate-300 text-center font-black align-middle ${getRiskColor(r2)}">${r2}</td>

                                                <!-- Action Plan Column -->
                                                <td class="border border-slate-300 p-1 bg-slate-50/40 text-center align-middle">
                                                    <div class="flex bg-slate-200 p-1 text-[7px] font-bold text-slate-600 rounded mb-1.5 mx-auto max-w-[440px]">
                                                        <div class="flex-1 px-1">${t.actionDesc}</div>
                                                        <div class="w-20 px-1">${t.actionOwner}</div>
                                                        <div class="w-24 px-1">${t.actionDeadline}</div>
                                                        <div class="w-24 px-1">${t.actionStatus}</div>
                                                        <div class="w-6 no-print"></div>
                                                    </div>
                                                    <div class="flex flex-col items-center">
                                                        ${row.actions.map(action => `
                                                            <div class="flex flex-row items-center gap-1 p-1 bg-white border border-slate-200 rounded-sm mb-1 w-full max-w-[440px]">
                                                                <input onchange="updateAction(${row.id}, ${action.id}, 'desc', this.value)" value="${action.desc}" class="flex-1 text-[9px] outline-none">
                                                                <input onchange="updateAction(${row.id}, ${action.id}, 'owner', this.value)" value="${action.owner}" class="w-20 text-[9px] outline-none border-l text-center">
                                                                <input onchange="updateAction(${row.id}, ${action.id}, 'deadline', this.value)" type="date" value="${action.deadline}" class="w-24 text-[8px] outline-none border-l px-1">
                                                                <select onchange="updateAction(${row.id}, ${action.id}, 'status', this.value)" class="w-24 text-[8pt] outline-none font-bold border-l bg-transparent cursor-pointer text-center ${getStatusClass(action.status)}">
                                                                    <option value="Not Started" ${action.status === 'Not Started' ? 'selected' : ''}>${t.statusNotStarted}</option>
                                                                    <option value="In Progress" ${action.status === 'In Progress' ? 'selected' : ''}>${t.statusInProgress}</option>
                                                                    <option value="Completed" ${action.status === 'Completed' ? 'selected' : ''}>${t.statusCompleted}</option>
                                                                    <option value="Cancelled" ${action.status === 'Cancelled' ? 'selected' : ''}>${t.statusCancelled}</option>
                                                                </select>
                                                                <button onclick="removeAction(${row.id}, ${action.id})" class="no-print text-slate-300 hover:text-red-500"><i data-lucide="minus-circle" class="w-3.5 h-3.5"></i></button>
                                                            </div>
                                                        `).join('')}
                                                        <button onclick="addAction(${row.id})" class="no-print mt-1 text-[8.5px] font-bold text-slate-500 flex items-center gap-1"><i data-lucide="plus" class="w-3 h-3"></i> ${t.btnAddAction}</button>
                                                    </div>
                                                </td>
                                                <td class="no-print p-2 text-center align-middle border-l border-slate-300">
                                                    <button onclick="removeRow(${row.id})" class="text-slate-300 hover:text-red-600 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                                </td>
                                            </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>

                        <!-- Footer -->
                        <div class="mt-8 flex flex-col gap-6">
                            <div class="w-full">
                                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">${t.signAssessor}</label>
                                <div class="w-96 border-b border-black h-8"></div>
                            </div>
                            <button onclick="addRow()" class="bg-slate-900 text-white px-6 py-2.5 rounded font-bold text-xs no-print w-fit transition-all hover:bg-slate-800 shadow-md flex items-center gap-2">
                                <i data-lucide="plus" class="w-4 h-4"></i> ${t.btnAddRow}
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Risk Matrix Modal -->
                ${state.modal ? `
                <div class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 p-4 no-print backdrop-blur-sm">
                    <div class="bg-white rounded-xl shadow-2xl max-w-4xl w-full flex flex-col md:flex-row overflow-hidden border border-slate-200">
                        <div class="flex-1 p-8">
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="font-bold text-xl uppercase text-slate-800 tracking-tight">${t.matrixTitle}</h3>
                                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button>
                            </div>
                            <div class="flex gap-4">
                                <div class="flex items-center font-bold text-[10px] text-slate-400 vertical-text" style="writing-mode: vertical-lr; transform: rotate(180deg);">
                                    INCREASING CONSEQUENCE (C) <i data-lucide="arrow-right" class="w-3 h-3 ml-1 transform rotate-90"></i>
                                </div>
                                <div class="grid grid-cols-6 gap-1.5" dir="ltr">
                                    ${[5,4,3,2,1].map(c => `
                                        <div class="flex items-center justify-center font-black text-xl text-red-600 w-10">${c}</div>
                                        ${[1,2,3,4,5].map(l => {
                                            const score = l * c;
                                            return `<button onclick="setScore(${l}, ${c})" class="aspect-square w-14 h-14 rounded-md shadow-sm font-black text-2xl transition-all hover:scale-110 ${getRiskColor(score)} flex items-center justify-center">${score}</button>`;
                                        }).join('')}
                                    `).join('')}
                                    <div></div>
                                    ${[1,2,3,4,5].map(l => `<div class="text-center font-black text-xl text-indigo-800 pt-3">${l}</div>`).join('')}
                                </div>
                            </div>
                            <div class="text-center font-bold text-[10px] text-slate-400 mt-8 uppercase flex items-center justify-center gap-2">
                                INCREASING LIKELIHOOD (L) <i data-lucide="arrow-right" class="w-3 h-3"></i>
                            </div>
                        </div>
                        
                        <div class="w-full md:w-80 bg-slate-50 p-8 border-l border-slate-200 space-y-5">
                            <h4 class="font-bold text-xs uppercase text-slate-400 tracking-widest mb-2">Risk Levels</h4>
                            <div class="flex items-center gap-4"><div class="w-14 h-11 risk-stop rounded flex items-center justify-center font-black">20-25</div><div class="text-[10px] font-bold">STOP activity</div></div>
                            <div class="flex items-center gap-4"><div class="w-14 h-11 risk-urgent rounded flex items-center justify-center font-black">15-16</div><div class="text-[10px] font-bold">URGENT action</div></div>
                            <div class="flex items-center gap-4"><div class="w-14 h-11 risk-action rounded flex items-center justify-center font-black">8-12</div><div class="text-[10px] font-bold">ACTION required</div></div>
                            <div class="flex items-center gap-4"><div class="w-14 h-11 risk-monitor rounded flex items-center justify-center font-black">3-6</div><div class="text-[10px] font-bold">MONITOR review</div></div>
                            <div class="flex items-center gap-4"><div class="w-14 h-11 risk-none rounded flex items-center justify-center font-black text-white">1-2</div><div class="text-[10px] font-bold">NO action</div></div>
                        </div>
                    </div>
                </div>` : ''}
            `;
            lucide.createIcons();
        }

        // Functions
        function updateHeader(f, v) { state.headerInfo[f] = v; }
        function updateRow(id, f, v) { state.rows = state.rows.map(r => r.id === id ? {...r, [f]: v} : r); }
        function updateAction(rId, aId, f, v) { state.rows = state.rows.map(r => { if(r.id === rId) r.actions = r.actions.map(a => a.id === aId ? {...a, [f]: v} : a); return r; }); render(); }
        function addAction(rId) { state.rows = state.rows.map(r => { if(r.id === rId) r.actions.push({ id: Date.now(), desc: '', owner: '', status: 'Not Started' }); return r; }); render(); }
        function removeAction(rId, aId) { state.rows = state.rows.map(r => { if(r.id === rId && r.actions.length > 1) r.actions = r.actions.filter(a => a.id !== aId); return r; }); render(); }
        function addRow() { state.rows.push({ id: Date.now(), hazard: '', who: '', how: '', existingControls: '', initialL: 1, initialC: 1, additionalControls: '', residualL: 1, residualC: 1, actions: [{ id: Date.now(), desc: '', owner: '', status: 'Not Started' }] }); render(); }
        function removeRow(id) { if(state.rows.length > 1) { state.rows = state.rows.filter(r => r.id !== id); render(); } }
        function openModal(rId, type) { state.modal = { rId, type }; render(); }
        function closeModal() { state.modal = null; render(); }
        function setScore(l, c) { const { rId, type } = state.modal; state.rows = state.rows.map(r => r.id === rId ? {...r, [type+'L']: l, [type+'C']: c} : r); closeModal(); }
        function toggleLang() { state.lang = state.lang === 'en' ? 'ar' : 'en'; render(); }
        
        function exportJson() { const d = JSON.stringify(state); const b = new Blob([d], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `Risk_Data_${new Date().toISOString().split('T')[0]}.json`; a.click(); }
        function importJson(e) { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload = (ev) => { try { Object.assign(state, JSON.parse(ev.target.result)); render(); } catch { alert("Invalid file"); } }; r.readAsText(f); e.target.value = ''; }

        function generateExportHTML() {
            const t = translations[state.lang];
            const isRtl = state.lang === 'ar';
            return `
                <html dir="${t.dir}">
                <head><meta charset="UTF-8"><style>
                    table { border-collapse: collapse; width: 100%; font-family: sans-serif; }
                    th, td { border: 1px solid #333; padding: 4px; font-size: 8pt; text-align: ${isRtl ? 'right' : 'left'}; vertical-align: top; }
                    .header { background: #d1d5db; font-weight: bold; text-align: center; }
                    .risk-stop { background: #dc2626; color: white; }
                    .risk-urgent { background: #f97316; color: white; }
                    .risk-action { background: #facc15; }
                    .risk-monitor { background: #4ade80; }
                    .risk-none { background: #16a34a; color: white; }
                </style></head>
                <body>
                    <h1 style="text-align:center">${t.formTitle}</h1>
                    <table>
                        <tr><td><b>${t.owner}</b>: ${state.headerInfo.owner}</td><td><b>${t.workActivity}</b>: ${state.headerInfo.workActivity}</td><td><b>${t.participants}</b>: ${state.headerInfo.participants}</td></tr>
                        <tr><td><b>${t.description}</b>: ${state.headerInfo.description}</td><td><b>${t.raNumber}</b>: ${state.headerInfo.raNumber}</td><td><b>${t.assessDate}</b>: ${state.headerInfo.assessDate}</td></tr>
                        <tr><td><b>Review Date</b>: ${state.headerInfo.reviewDate}</td><td></td><td></td></tr>
                    </table><br/>
                    <table>
                        <tr class="header">
                            <th rowspan="2">${t.colHazard}</th><th rowspan="2">${t.colWho}</th><th rowspan="2">${t.colHow}</th><th rowspan="2">${t.colControls}</th>
                            <th colspan="3">${t.colRating}</th><th rowspan="2">${t.colAddControls}</th><th colspan="3">${t.colResidual}</th><th rowspan="2">${t.colActionPlan}</th>
                        </tr>
                        <tr class="header"><th>L</th><th>C</th><th>R</th><th>L</th><th>C</th><th>R</th></tr>
                        ${state.rows.map(r => `
                            <tr>
                                <td>${r.hazard}</td><td>${r.who}</td><td>${r.how}</td><td>${r.existingControls}</td>
                                <td align="center">${r.initialL}</td><td align="center">${r.initialC}</td>
                                <td align="center" style="background-color: ${getColorHex(r.initialL * r.initialC)}; color: ${r.initialL * r.initialC >= 15 ? 'white' : 'black'}">${r.initialL * r.initialC}</td>
                                <td>${r.additionalControls}</td>
                                <td align="center">${r.residualL}</td><td align="center">${r.residualC}</td>
                                <td align="center" style="background-color: ${getColorHex(r.residualL * r.residualC)}; color: ${r.residualL * r.residualC >= 15 ? 'white' : 'black'}">${r.residualL * r.residualC}</td>
                                <td>${r.actions.map(a => `• ${a.desc} [${a.owner}] (${a.status})`).join('<br>')}</td>
                            </tr>
                        `).join('')}
                    </table>
                </body></html>`;
        }

        function getColorHex(s) {
            if (s >= 20) return '#dc2626';
            if (s >= 15) return '#f97316';
            if (s >= 8) return '#facc15';
            if (s >= 3) return '#4ade80';
            return '#16a34a';
        }

        function exportXls() { const b = new Blob([generateExportHTML()], {type: 'application/vnd.ms-excel'}); const u = URL.createObjectURL(b); const a = document.createElement('a'); a.href = u; a.download = 'Risk_Assessment.xls'; a.click(); }
        function exportDoc() { const b = new Blob(['\ufeff', generateExportHTML()], {type: 'application/msword'}); const u = URL.createObjectURL(b); const a = document.createElement('a'); a.href = u; a.download = 'Risk_Assessment.doc'; a.click(); }

        render();
    </script>
</body>
</html>
