<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Assessment Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: #f1f5f9;
        }
        [dir="rtl"] {
            text-align: right;
        }
        textarea {
            resize: none;
        }
        .risk-stop { background-color: #dc2626 !important; color: white !important; }
        .risk-urgent { background-color: #f97316 !important; color: white !important; }
        .risk-action { background-color: #facc15 !important; color: black !important; }
        .risk-monitor { background-color: #4ade80 !important; color: black !important; }
        .risk-none { background-color: #16a34a !important; color: white !important; }

        @page {
            size: A4 landscape;
            margin: 10mm;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            #main-container { 
                box-shadow: none !important; 
                width: 100% !important; 
                max-width: 100% !important; 
                margin: 0 !important;
                border: none !important;
            }
            table { 
                font-size: 7pt !important; 
                border-collapse: collapse !important; 
                width: 100% !important;
                table-layout: fixed !important;
            }
            th, td { 
                border: 1px solid #aaa !important; 
                padding: 2px !important;
                word-wrap: break-word !important;
            }
            textarea, input, select {
                border: none !important;
                background: transparent !important;
                padding: 0 !important;
            }
            * { 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
            }
        }

        ::placeholder {
            color: #94a3b8;
            opacity: 0.6;
            font-style: italic;
        }
    </style>
</head>
<body class="transition-all duration-300">

    <div id="app" class="p-4 md:p-8 print:p-0">
        <!-- App will be rendered here -->
    </div>

    <script>
        const translations = {
            en: {
                dir: 'ltr',
                title: "Risk Assessment Portal",
                formTitle: "Risk Assessment Form",
                owner: "Owner",
                staffId: "Staff ID",
                dept: "Department",
                assessDate: "Assessment Date",
                reviewDate: "Review Date",
                btnHazard: "View Hazard Table",
                btnPrint: "Print Assessment",
                btnExcel: "Export Excel",
                btnWord: "Export Word",
                btnSaveJson: "Save Data (JSON)",
                btnLoadJson: "Restore Data (JSON)",
                colHazard: "What is the hazard?",
                colWho: "Who might be harmed?",
                colHow: "How might people be harmed?",
                colControls: "Existing risk control measures",
                colRating: "Risk rating",
                colAddControls: "Additional controls",
                colResidual: "New risk rating (Residual)",
                colAction: "Action Plan",
                actionDesc: "ACTION DESCRIPTION",
                actionOwner: "OWNER",
                actionDeadline: "DEADLINE",
                actionStatus: "STATUS",
                btnAddAction: "Add Another Action",
                btnAddRow: "Add Hazard Row",
                signAssessor: "Assessor Signature",
                signManager: "Management Approval",
                footer: "Internal Risk Assessment Document",
                statusInProgress: "In Progress",
                statusCompleted: "Completed",
                statusCancelled: "Cancelled",
                matrixTitle: "Risk Matrix Selector",
                matrixSubtitle: "Select score from table",
                phHazard: "e.g., Reach stacker operating in the yard",
                phWho: "e.g., Ground workers, tally clerks",
                phHow: "e.g., Struck by moving vehicle",
                phControls: "e.g., Designated walkways and speed limits.",
                phAddControls: "e.g., Installation of proximity sensors.",
                phActionDesc: "e.g., Install sensors on Stackers",
                phActionOwner: "e.g., HSE Manager"
            },
            ar: {
                dir: 'rtl',
                title: "بوابة تقييم المخاطر",
                formTitle: "نموذج تقييم المخاطر",
                owner: "المالك",
                staffId: "رقم الموظف",
                dept: "القسم",
                assessDate: "تاريخ التقييم",
                reviewDate: "تاريخ المراجعة",
                btnHazard: "عرض جدول المخاطر",
                btnPrint: "طباعة التقييم",
                btnExcel: "تصدير Excel",
                btnWord: "تصدير Word",
                btnSaveJson: "حفظ البيانات (JSON)",
                btnLoadJson: "استعادة البيانات (JSON)",
                colHazard: "ما هو الخطر؟",
                colWho: "من قد يتضرر؟",
                colHow: "كيف يمكن أن يتضرر الناس؟",
                colControls: "تدابير مراقبة المخاطر الحالية",
                colRating: "تقييم المخاطر",
                colAddControls: "ضوابط إضافية",
                colResidual: "تقييم المخاطر الجديد (المتبقي)",
                colAction: "خطة العمل",
                actionDesc: "وصف الإجراء",
                actionOwner: "المسؤول",
                actionDeadline: "الموعد النهائي",
                actionStatus: "الحالة",
                btnAddAction: "إضافة إجراء آخر",
                btnAddRow: "إضافة صف خطر",
                signAssessor: "توقيع المقيم",
                signManager: "اعتماد الإدارة",
                footer: "وثيقة تقييم المخاطر الداخلية",
                statusInProgress: "قيد التنفيذ",
                statusCompleted: "مكتمل",
                statusCancelled: "ملغى",
                matrixTitle: "محدد مصفوفة المخاطر",
                matrixSubtitle: "اختر الدرجة من الجدول",
                phHazard: "مثال: مكدس الحاويات في الساحة",
                phWho: "مثال: العمال الميدانيون، موظفو التعداد",
                phHow: "مثال: الاصطدام بمركبة متحركة",
                phControls: "مثال: ممرات مشاة مخصصة وحدود السرعة.",
                phAddControls: "مثال: تركيب أجهزة استشعار التقارب.",
                phActionDesc: "مثال: تركيب أجهزة استشعار في المكدسات",
                phActionOwner: "مثال: مدير الصحة والسلامة"
            }
        };

        let state = {
            lang: 'en',
            rows: [{
                id: Date.now(),
                hazard: '',
                who: '',
                how: '',
                existingControls: '',
                initialL: 1,
                initialC: 1,
                additionalControls: '',
                residualL: 1,
                residualC: 1,
                actions: [{ id: Date.now(), desc: '', owner: '', deadline: '', status: 'In Progress' }]
            }],
            headerInfo: {
                owner: '',
                staffId: '',
                department: '',
                assessmentDate: '',
                reviewDate: ''
            },
            modal: null // { rowId, type }
        };

        function getRiskColor(score) {
            if (score >= 20) return 'risk-stop';
            if (score >= 15) return 'risk-urgent';
            if (score >= 8) return 'risk-action';
            if (score >= 3) return 'risk-monitor';
            return 'risk-none';
        }

        function render() {
            const app = document.getElementById('app');
            const t = translations[state.lang];
            const isRtl = state.lang === 'ar';
            document.body.dir = t.dir;

            app.innerHTML = `
                <div id="main-container" class="max-w-[99%] mx-auto bg-white shadow-xl rounded-lg overflow-hidden print:shadow-none">
                    
                    <!-- Toolbar -->
                    <div class="bg-slate-900 p-4 text-white flex flex-wrap gap-3 items-center justify-between no-print">
                        <div class="flex items-center gap-2 text-xl font-bold">
                            <i data-lucide="shield-check" class="text-green-400"></i>
                            ${t.title}
                        </div>
                        <div class="flex flex-wrap gap-2">
                            <button onclick="openModal(${state.rows[0].id}, 'initial')" class="flex items-center gap-2 px-3 py-2 bg-slate-700 hover:bg-slate-600 rounded-md transition-all text-xs font-bold">
                                <i data-lucide="table" class="w-4 h-4"></i> ${t.btnHazard}
                            </button>
                            <button onclick="toggleLang()" class="flex items-center gap-2 px-3 py-2 bg-slate-700 hover:bg-slate-600 rounded-md transition-all text-xs font-bold border-l border-slate-600">
                                <i data-lucide="languages" class="w-4 h-4"></i> ${state.lang === 'en' ? 'العربية' : 'English'}
                            </button>
                            <button onclick="window.print()" class="flex items-center gap-2 px-3 py-2 bg-blue-600 hover:bg-blue-700 rounded-md transition-all text-xs font-bold">
                                <i data-lucide="printer" class="w-4 h-4"></i> ${t.btnPrint}
                            </button>
                            <button onclick="exportXls()" class="flex items-center gap-2 px-3 py-2 bg-green-600 hover:bg-green-700 rounded-md transition-all text-xs font-bold">
                                <i data-lucide="file-spreadsheet" class="w-4 h-4"></i> ${t.btnExcel}
                            </button>
                            <button onclick="exportDoc()" class="flex items-center gap-2 px-3 py-2 bg-indigo-600 hover:bg-indigo-700 rounded-md transition-all text-xs font-bold">
                                <i data-lucide="file" class="w-4 h-4"></i> ${t.btnWord}
                            </button>
                            <button onclick="exportJson()" class="flex items-center gap-2 px-3 py-2 bg-slate-600 hover:bg-slate-500 rounded-md transition-all text-xs font-bold border-l border-slate-500">
                                <i data-lucide="save" class="w-4 h-4"></i> ${t.btnSaveJson}
                            </button>
                            <button onclick="document.getElementById('json-input').click()" class="flex items-center gap-2 px-3 py-2 bg-slate-600 hover:bg-slate-500 rounded-md transition-all text-xs font-bold">
                                <i data-lucide="upload" class="w-4 h-4"></i> ${t.btnLoadJson}
                            </button>
                            <input type="file" id="json-input" class="hidden" accept=".json" onchange="importJson(event)">
                        </div>
                    </div>

                    <div id="printable-area" class="p-4 md:p-6">
                        <!-- Header Info -->
                        <div class="mb-6 border-b pb-6">
                            <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tight mb-4">${t.formTitle}</h1>
                            <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                                ${['owner', 'staffId', 'department', 'assessmentDate', 'reviewDate'].map(field => `
                                    <div>
                                        <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest">${t[field]}</label>
                                        <input 
                                            class="w-full border-b border-slate-300 outline-none py-1 text-sm font-medium ${field === 'reviewDate' ? 'text-red-600 font-bold' : ''}" 
                                            type="${field.includes('Date') ? 'date' : 'text'}"
                                            value="${state.headerInfo[field]}"
                                            onchange="updateHeader('${field}', this.value)"
                                        >
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <!-- Main Table -->
                        <div class="overflow-x-auto">
                            <table class="w-full border-collapse border border-slate-300 text-[10.5px]">
                                <thead class="bg-slate-100 text-slate-800 font-bold text-[8.5px] uppercase">
                                    <tr>
                                        <th class="border border-slate-300 p-2 text-start w-[12%]" rowspan="2">${t.colHazard}</th>
                                        <th class="border border-slate-300 p-2 text-start w-[10%]" rowspan="2">${t.colWho}</th>
                                        <th class="border border-slate-300 p-2 text-start w-[10%]" rowspan="2">${t.colHow}</th>
                                        <th class="border border-slate-300 p-2 text-start w-[12%]" rowspan="2">${t.colControls}</th>
                                        <th class="border border-slate-300 p-0.5 text-center" colspan="3">${t.colRating}</th>
                                        <th class="border border-slate-300 p-2 text-start w-[12%]" rowspan="2">${t.colAddControls}</th>
                                        <th class="border border-slate-300 p-0.5 text-center" colspan="3">${t.colResidual}</th>
                                        <th class="border border-slate-300 p-2 text-start min-w-[450px]" rowspan="2">${t.colAction}</th>
                                        <th class="border border-slate-300 p-1 no-print w-8" rowspan="2"></th>
                                    </tr>
                                    <tr>
                                        <th class="border border-slate-300 p-0.5 text-center w-6">L</th>
                                        <th class="border border-slate-300 p-0.5 text-center w-6">C</th>
                                        <th class="border border-slate-300 p-0.5 text-center w-8">R</th>
                                        <th class="border border-slate-300 p-0.5 text-center w-6">L</th>
                                        <th class="border border-slate-300 p-0.5 text-center w-6">C</th>
                                        <th class="border border-slate-300 p-0.5 text-center w-8">R</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${state.rows.map((row) => {
                                        const initialR = row.initialL * row.initialC;
                                        const residualR = row.residualL * row.residualC;
                                        return `
                                            <tr class="align-top hover:bg-slate-50 transition-colors">
                                                <td class="border border-slate-300 p-1">
                                                    <textarea onchange="updateRow(${row.id}, 'hazard', this.value)" placeholder="${t.phHazard}" class="w-full bg-transparent outline-none p-1" rows="6">${row.hazard}</textarea>
                                                </td>
                                                <td class="border border-slate-300 p-1">
                                                    <textarea onchange="updateRow(${row.id}, 'who', this.value)" placeholder="${t.phWho}" class="w-full bg-transparent outline-none p-1" rows="6">${row.who}</textarea>
                                                </td>
                                                <td class="border border-slate-300 p-1">
                                                    <textarea onchange="updateRow(${row.id}, 'how', this.value)" placeholder="${t.phHow}" class="w-full bg-transparent outline-none p-1" rows="6">${row.how}</textarea>
                                                </td>
                                                <td class="border border-slate-300 p-1">
                                                    <textarea onchange="updateRow(${row.id}, 'existingControls', this.value)" placeholder="${t.phControls}" class="w-full bg-transparent outline-none p-1" rows="6">${row.existingControls}</textarea>
                                                </td>
                                                
                                                <td onclick="openModal(${row.id}, 'initial')" class="border border-slate-300 p-0 text-center font-bold cursor-pointer hover:bg-blue-50 align-middle">${row.initialL}</td>
                                                <td onclick="openModal(${row.id}, 'initial')" class="border border-slate-300 p-0 text-center font-bold cursor-pointer hover:bg-blue-50 align-middle">${row.initialC}</td>
                                                <td class="border border-slate-300 p-0 text-center font-black align-middle ${getRiskColor(initialR)}">${initialR}</td>

                                                <td class="border border-slate-300 p-1">
                                                    <textarea onchange="updateRow(${row.id}, 'additionalControls', this.value)" placeholder="${t.phAddControls}" class="w-full bg-transparent outline-none p-1" rows="6">${row.additionalControls}</textarea>
                                                </td>

                                                <td onclick="openModal(${row.id}, 'residual')" class="border border-slate-300 p-0 text-center font-bold cursor-pointer hover:bg-blue-50 align-middle">${row.residualL}</td>
                                                <td onclick="openModal(${row.id}, 'residual')" class="border border-slate-300 p-0 text-center font-bold cursor-pointer hover:bg-blue-50 align-middle">${row.residualC}</td>
                                                <td class="border border-slate-300 p-0 text-center font-black align-middle ${getRiskColor(residualR)}">${residualR}</td>

                                                <td class="border border-slate-300 p-1 bg-slate-50/40">
                                                    <div class="flex bg-slate-200 p-1 text-[7px] font-bold text-slate-600 rounded mb-1.5">
                                                        <div class="flex-1 px-1">${t.actionDesc}</div>
                                                        <div class="w-20 px-1">${t.actionOwner}</div>
                                                        <div class="w-24 px-1">${t.actionDeadline}</div>
                                                        <div class="w-16 px-1">${t.actionStatus}</div>
                                                        <div class="w-6 no-print"></div>
                                                    </div>
                                                    ${row.actions.map(action => `
                                                        <div class="flex flex-row items-center gap-1 p-1 bg-white border border-slate-200 rounded-sm shadow-sm mb-1">
                                                            <input onchange="updateAction(${row.id}, ${action.id}, 'desc', this.value)" placeholder="${t.phActionDesc}" value="${action.desc}" class="flex-1 text-[9px] outline-none">
                                                            <input onchange="updateAction(${row.id}, ${action.id}, 'owner', this.value)" placeholder="${t.phActionOwner}" value="${action.owner}" class="w-20 text-[9px] outline-none border-l border-slate-100 px-1">
                                                            <input onchange="updateAction(${row.id}, ${action.id}, 'deadline', this.value)" type="date" value="${action.deadline}" class="w-24 text-[8.5px] outline-none border-l border-slate-100 px-1">
                                                            <select onchange="updateAction(${row.id}, ${action.id}, 'status', this.value)" class="w-16 text-[8pt] outline-none font-bold bg-transparent border-l border-slate-100">
                                                                <option value="In Progress" ${action.status === 'In Progress' ? 'selected' : ''}>P</option>
                                                                <option value="Completed" ${action.status === 'Completed' ? 'selected' : ''}>D</option>
                                                                <option value="Cancelled" ${action.status === 'Cancelled' ? 'selected' : ''}>X</option>
                                                            </select>
                                                            <button onclick="removeAction(${row.id}, ${action.id})" class="no-print text-slate-300 hover:text-red-500"><i data-lucide="minus-circle" class="w-3.5 h-3.5"></i></button>
                                                        </div>
                                                    `).join('')}
                                                    <button onclick="addAction(${row.id})" class="no-print mt-1 text-[8.5px] font-bold text-slate-500 flex items-center gap-1"><i data-lucide="plus" class="w-3 h-3"></i> ${t.btnAddAction}</button>
                                                </td>

                                                <td class="border border-slate-300 p-1 text-center no-print align-middle">
                                                    <button onclick="removeRow(${row.id})" class="text-slate-200 hover:text-red-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                                </td>
                                            </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>

                        <div class="mt-8 flex justify-between items-center no-print">
                            <button onclick="addRow()" class="bg-slate-900 text-white px-6 py-2.5 rounded-lg flex items-center gap-2 font-bold text-sm">
                                <i data-lucide="plus" class="w-4 h-4"></i> ${t.btnAddRow}
                            </button>
                            <div class="grid grid-cols-2 gap-20 w-80 pr-10">
                                <div class="text-center"><div class="border-b-2 border-slate-900 h-10 w-full mb-1"></div><p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">${t.signAssessor}</p></div>
                                <div class="text-center"><div class="border-b-2 border-slate-200 h-10 w-full mb-1"></div><p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">${t.signManager}</p></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-slate-50 p-6 text-center text-[9px] text-slate-400 border-t print:block hidden">
                        ${t.footer} • Generated for: ${state.headerInfo.owner || 'N/A'} • ${t.dept}: ${state.headerInfo.department || 'N/A'}
                    </div>
                </div>

                <!-- Score Matrix Modal -->
                ${state.modal ? `
                    <div class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 p-4 backdrop-blur-sm no-print">
                        <div class="bg-white rounded-xl shadow-2xl max-w-lg w-full overflow-hidden border">
                            <div class="bg-slate-900 p-4 text-white flex justify-between items-center">
                                <h3 class="font-bold flex items-center gap-2"><i data-lucide="table"></i> ${t.matrixTitle}</h3>
                                <button onclick="closeModal()"><i data-lucide="x"></i></button>
                            </div>
                            <div class="p-8">
                                <p class="text-[10px] text-slate-400 mb-6 text-center font-bold tracking-widest uppercase">${t.matrixSubtitle}</p>
                                <div class="grid grid-cols-6 gap-1.5" dir="ltr">
                                    <div class="flex items-center justify-center text-[10px] font-black text-slate-300">C \ L</div>
                                    ${[1,2,3,4,5].map(l => `<div class="text-center font-bold text-[10px]">L: ${l}</div>`).join('')}
                                    ${[5,4,3,2,1].map(c => `
                                        <div class="flex items-center justify-center font-bold text-[10px]">C: ${c}</div>
                                        ${[1,2,3,4,5].map(l => {
                                            const score = l * c;
                                            return `<button onclick="setScore(${l}, ${c})" class="aspect-square rounded shadow-sm font-black text-xl hover:scale-110 transition-transform ${getRiskColor(score)}">${score}</button>`;
                                        }).join('')}
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                ` : ''}
            `;
            lucide.createIcons();
        }

        // Logic Functions
        function toggleLang() {
            state.lang = state.lang === 'en' ? 'ar' : 'en';
            render();
        }

        function updateHeader(field, val) {
            state.headerInfo[field] = val;
        }

        function addRow() {
            state.rows.push({
                id: Date.now(),
                hazard: '', who: '', how: '', existingControls: '',
                initialL: 1, initialC: 1, additionalControls: '',
                residualL: 1, residualC: 1,
                actions: [{ id: Date.now(), desc: '', owner: '', deadline: '', status: 'In Progress' }]
            });
            render();
        }

        function removeRow(id) {
            if (state.rows.length > 1) {
                state.rows = state.rows.filter(r => r.id !== id);
                render();
            }
        }

        function updateRow(id, field, val) {
            state.rows = state.rows.map(r => r.id === id ? {...r, [field]: val} : r);
        }

        function addAction(rowId) {
            state.rows = state.rows.map(r => {
                if (r.id === rowId) {
                    r.actions.push({ id: Date.now(), desc: '', owner: '', deadline: '', status: 'In Progress' });
                }
                return r;
            });
            render();
        }

        function removeAction(rowId, actionId) {
            state.rows = state.rows.map(r => {
                if (r.id === rowId && r.actions.length > 1) {
                    r.actions = r.actions.filter(a => a.id !== actionId);
                }
                return r;
            });
            render();
        }

        function updateAction(rowId, actionId, field, val) {
            state.rows = state.rows.map(r => {
                if (r.id === rowId) {
                    r.actions = r.actions.map(a => a.id === actionId ? {...a, [field]: val} : a);
                }
                return r;
            });
        }

        function openModal(rowId, type) {
            state.modal = { rowId, type };
            render();
        }

        function closeModal() {
            state.modal = null;
            render();
        }

        function setScore(l, c) {
            const { rowId, type } = state.modal;
            state.rows = state.rows.map(r => r.id === rowId ? {...r, [type+'L']: l, [type+'C']: c} : r);
            closeModal();
        }

        // JSON Save/Restore
        function exportJson() {
            const data = JSON.stringify({
                headerInfo: state.headerInfo,
                rows: state.rows
            }, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Risk_Assessment_Data_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importJson(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (imported.headerInfo && imported.rows) {
                        state.headerInfo = imported.headerInfo;
                        state.rows = imported.rows;
                        render();
                    } else {
                        alert("Invalid JSON format");
                    }
                } catch (err) {
                    alert("Error parsing JSON file");
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // Reset input
        }

        // Existing Export Functions (XLS/DOC)
        function generateExportHTML() {
            const t = translations[state.lang];
            const isRtl = state.lang === 'ar';
            return `
                <html dir="${t.dir}">
                <head><meta charset="UTF-8"><style>
                    table { border-collapse: collapse; width: 100%; font-family: sans-serif; }
                    th, td { border: 1px solid #333; padding: 4px; font-size: 8.5pt; text-align: ${isRtl ? 'right' : 'left'}; vertical-align: top; }
                    .header { background: #0f172a; color: white; font-weight: bold; text-align: center; }
                    .risk-stop { background: #dc2626 !important; color: white !important; }
                    .risk-urgent { background: #f97316 !important; color: white !important; }
                    .risk-action { background: #facc15 !important; }
                    .risk-monitor { background: #4ade80 !important; }
                    .risk-none { background: #16a34a !important; color: white !important; }
                </style></head>
                <body>
                    <h1 style="text-align:center">${t.formTitle}</h1>
                    <table>
                        <tr><td><b>${t.owner}</b>: ${state.headerInfo.owner}</td><td><b>${t.staffId}</b>: ${state.headerInfo.staffId}</td><td><b>${t.dept}</b>: ${state.headerInfo.department}</td></tr>
                        <tr><td><b>${t.assessDate}</b>: ${state.headerInfo.assessmentDate}</td><td><b style="color:red">${t.reviewDate}</b>: ${state.headerInfo.reviewDate}</td><td></td></tr>
                    </table><br/>
                    <table>
                        <tr class="header">
                            <th rowspan="2">${t.colHazard}</th><th rowspan="2">${t.colWho}</th><th rowspan="2">${t.colHow}</th><th rowspan="2">${t.colControls}</th>
                            <th colspan="3">${t.colRating}</th><th rowspan="2">${t.colAddControls}</th><th colspan="3">${t.colResidual}</th><th rowspan="2">${t.colAction}</th>
                        </tr>
                        <tr class="header"><th>L</th><th>C</th><th>R</th><th>L</th><th>C</th><th>R</th></tr>
                        ${state.rows.map(r => `
                            <tr>
                                <td>${r.hazard}</td><td>${r.who}</td><td>${r.how}</td><td>${r.existingControls}</td>
                                <td align="center">${r.initialL}</td><td align="center">${r.initialC}</td>
                                <td align="center" style="background-color: ${initialColor(r.initialL * r.initialC)}" class="${getRiskColor(r.initialL * r.initialC)}">${r.initialL * r.initialC}</td>
                                <td>${r.additionalControls}</td>
                                <td align="center">${r.residualL}</td><td align="center">${r.residualC}</td>
                                <td align="center" style="background-color: ${initialColor(r.residualL * r.residualC)}" class="${getRiskColor(r.residualL * r.residualC)}">${r.residualL * r.residualC}</td>
                                <td>${r.actions.map(a => `• ${a.desc} [${a.owner}] (${a.deadline}) - ${a.status}`).join('<br/>')}</td>
                            </tr>
                        `).join('')}
                    </table>
                </body></html>`;
        }

        function initialColor(score) {
            if (score >= 20) return '#dc2626';
            if (score >= 15) return '#f97316';
            if (score >= 8) return '#facc15';
            if (score >= 3) return '#4ade80';
            return '#16a34a';
        }

        function exportXls() {
            const blob = new Blob([generateExportHTML()], { type: 'application/vnd.ms-excel' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Risk_Assessment.xls';
            a.click();
        }

        function exportDoc() {
            const blob = new Blob(['\ufeff', generateExportHTML()], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Risk_Assessment.doc';
            a.click();
        }

        // Init
        render();
    </script>
</body>
</html>
